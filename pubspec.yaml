name: expence_flow_pro
description: "ExpenseFlow Pro – Offline-first personal finance tracker."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  get: ^4.7.2
  get_storage: ^2.1.1

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Local database (offline-first)
  drift: ^2.20.2
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Connectivity
  connectivity_plus: ^6.0.5

  # Biometric
  local_auth: ^2.3.0

  # UI
  fl_chart: ^0.69.0
  skeletonizer: ^1.4.2
  cached_network_image: ^3.4.1

  # Utils
  uuid: ^4.5.1
  intl: ^0.19.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.20.2
  build_runner: ^2.4.12
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
